  name: CI

  on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

  jobs:
    lint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.10"
        - run: pip install ruff
        - run: ruff check pipeline/ simulator/ raspberry_pi/

    test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.10"
        - run: pip install pytest influxdb-client requests
        - run: cd pipeline && python -m pytest tests/ -v

    docker-build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - run: docker build ./pipeline
